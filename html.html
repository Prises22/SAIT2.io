<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
        }

      
        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 3px solid #e94560;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h1 span {
            color: #e94560;
        }

     
        nav {
            margin-top: 1rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem 1.5rem;
            background: #e94560;
            border-radius: 25px;
            transition: 0.3s;
            display: inline-block;
        }

        nav a:hover {
            background: #ff6b8a;
            transform: scale(1.05);
        }

      
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .hero {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
        }

    
        .anime-list {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1rem;
            width: 250px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .card h3 {
            color: #e94560;
        }

        /* Подвал */
        footer {
            text-align: center;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.8);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>sait<span></span></h1>
        <nav>
            <a href="gallery.html">Галерея</a>
        </nav>
    </header>

    <div class="container">
        <div class="hero">
            <h2 href="апв.webp">Добро пожаловать </h2>
        </div>

            </div>
            
            </div>
        </div>
    </div>


</body>
</html>
